name: Test

on:
  pull_request:
  push:
    branches:
      - main
  # The examples load MapLibre, styles and tiles from tiles.versatiles.org at
  # unversioned paths, so an upstream update can break the published playground
  # with no commit here. A daily run catches that instead of waiting for a push.
  schedule:
    - cron: "23 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run check

      - name: Smoke-test examples
        run: npm test
