name: Build and Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  repository_dispatch:

permissions:
  contents: read

# Pages has a single deploy target, so runs must not overlap. Queued runs
# collapse to the latest, but an in-progress run is never cancelled: aborting
# mid-deploy could leave the published site half-updated.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run check

      - name: Smoke-test examples
        run: npm test

      - name: Build Screenshots
        run: npm run screenshots

      - name: Build Pages
        run: npm run build

      - name: Upload static files as artifact
        id: deployment
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/

  deploy:
    needs: build

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
